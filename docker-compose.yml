version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartteam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartteam"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-exclude ".venv"
        --reload-exclude "frontend"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/smartteam
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      DEBUG: "true"
      ALLOWED_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://frontend:5173"]'
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app        # only mount source; keeps pip packages intact
      - ./tests:/app/tests
    depends_on:
      db:
        condition: service_healthy

  # ── React / Vite frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_HOST: http://api:8000   # Vite proxy target inside Docker network
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    depends_on:
      - api

volumes:
  postgres_data:
